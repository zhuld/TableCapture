<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 20px;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }

    .card {
      width: 100%;
      background: #ffffffdd;
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #00a1ae 0%, #2a7b82 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(2, 83, 90, 0.449);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 15px rgba(2, 83, 90, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
      transition: all 0.2s;
    }

    #downloadLink {
      display: inline-block;
      margin-top: 12px;
      font-size: 13px;
      color: #1e88e5;
      text-decoration: none;
    }

    .success {
      color: #2e7d32;
    }

    .error {
      color: #c62828;
    }

    .info {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
      <!-- 表格 / 数据提取图标 -->
      <img src="../icons/icon_128.png" alt="成绩表提取器" width="48" height="48"/>
    <h2>成绩表提取器</h2>
    <p class="subtitle">一键识别并导出JSON格式</p>
    <button id="extractBtn">
      <span class="download-icon"></span>
      提取成绩表
    </button>
    <div id="status"></div>
    <a  id="downloadLink" ></a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
